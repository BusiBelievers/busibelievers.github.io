<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Volunteer Dispatch Board</title>

<style>

body{
font-family:Arial, sans-serif;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.12);
}

.btn{
display:inline-block;
padding:10px 18px;
background:#d4af37;
color:black;
border-radius:8px;
text-decoration:none;
font-weight:bold;
margin-top:10px;
cursor:pointer;
}

.status{
font-weight:bold;
padding:4px 8px;
border-radius:6px;
}

.pending{background:#f1c40f;color:black;}
.approved{background:#3498db;}
.progress{background:#e67e22;}
.completed{background:#2ecc71;color:black;}

</style>

</head>

<body>

<div class="container">

<h1 style="text-align:center">BUSI Volunteer Dispatch Board</h1>

<p style="text-align:center;max-width:700px;margin:auto">
Volunteers can view open assistance requests and sign up to help
with community projects coordinated by Busi Believers Incorporated.
</p>

<div id="volunteerProjects" class="grid"></div>

</div>

<script>

/* Load BUSI cases from admin dashboard */

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];

let container = document.getElementById("volunteerProjects");

/* Build project cards */

cases.forEach((c,index) => {

if(!c.volunteersNeeded){
c.volunteersNeeded = 3;
}

let statusClass = "pending";

if(c.status === "Approved") statusClass = "approved";
if(c.status === "In Progress") statusClass = "progress";
if(c.status === "Completed") statusClass = "completed";

container.innerHTML += `

<div class="card">

<h3>${c.caseID}</h3>

<p><strong>Project:</strong> ${c.project}</p>

<p><strong>Location:</strong> ${c.location}</p>

<p><strong>Status:</strong>
<span class="status ${statusClass}">
${c.status}
</span>
</p>

<p>
<strong>Volunteers Needed:</strong>
<span id="vol-${index}">
${c.volunteersNeeded}
</span>
</p>

<button class="btn" onclick="claimVolunteer(${index})">
Volunteer for Project
</button>

</div>

`;

});

/* Volunteer claim system */

function claimVolunteer(index){

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];

if(cases[index].volunteersNeeded > 0){

cases[index].volunteersNeeded--;

localStorage.setItem("busiCases", JSON.stringify(cases));

document.getElementById("vol-"+index).innerText = cases[index].volunteersNeeded;

alert("Thank you for volunteering! A BUSI coordinator will contact you.");

}

}

</script>

</body>
</html>
