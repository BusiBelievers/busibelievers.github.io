<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sponsor a BUSI Project</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:800px;
margin:auto;
padding:40px 20px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
}

button{
padding:14px 20px;
background:#d4af37;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Sponsor a BUSI Project</h1>

<p>
Support a community project and help families receive the assistance
they need.
</p>

<form>

<input type="text" placeholder="BUSI Case Number">

<input type="text" placeholder="Sponsor Name">

<input type="email" placeholder="Email Address">

<input type="number" placeholder="Donation Amount">

<button>Sponsor Project</button>

</form>

</div>

</body>
</html>
