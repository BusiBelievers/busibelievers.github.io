<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BUSI Live Project Dashboard</title>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:40px;
}

.card{
background:rgba(255,255,255,0.06);
padding:25px;
border-radius:16px;
border:1px solid rgba(255,255,255,0.1);
text-align:left;
}

.stat{
font-size:36px;
font-weight:bold;
color:#d4af37;
}

.progress{
background:#1c2233;
height:16px;
border-radius:10px;
overflow:hidden;
margin-top:8px;
}

.bar{
background:#d4af37;
height:100%;
}

.status{
font-weight:bold;
}

</style>

</head>

<body>

<div class="container">

<h1>BUSI Live Community Project Dashboard</h1>

<p style="max-width:700px;margin:auto">
Live overview of community assistance projects coordinated by
Busi Believers Incorporated.
</p>

<div class="grid">

<div class="card">
<div class="stat" id="totalProjects">0</div>
<p>Total Projects</p>
</div>

<div class="card">
<div class="stat" id="activeProjects">0</div>
<p>Active Projects</p>
</div>

<div class="card">
<div class="stat" id="completedProjects">0</div>
<p>Completed Projects</p>
</div>

<div class="card">
<div class="stat" id="volunteersNeeded">0</div>
<p>Total Volunteers Needed</p>
</div>

</div>

<h2 style="margin-top:60px">Active Community Projects</h2>

<div id="projectBoard" class="grid"></div>

</div>

<script>

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];

let total = cases.length;
let active = 0;
let completed = 0;
let volunteers = 0;

cases.forEach(c => {

if(c.status === "Completed"){
completed++;
}else{
active++;
}

volunteers += Number(c.volunteersNeeded) || 0;

});

document.getElementById("totalProjects").innerText = total;
document.getElementById("activeProjects").innerText = active;
document.getElementById("completedProjects").innerText = completed;
document.getElementById("volunteersNeeded").innerText = volunteers;

let board = document.getElementById("projectBoard");

cases.forEach(c => {

let goal = Number(c.fundingGoal) || 0;
let raised = Number(c.fundingRaised) || 0;

let percent = 0;

if(goal > 0){
percent = (raised / goal) * 100;
}

let volunteers = "";

if(c.volunteersAssigned && c.volunteersAssigned.length > 0){

volunteers = "<p><strong>Volunteers Assigned:</strong></p>";

c.volunteersAssigned.forEach(v => {
volunteers += `<p>• ${v}</p>`;
});

}else{

volunteers = "<p>No volunteers assigned yet</p>";

}

cases.forEach(c => {

let assigned = c.volunteersAssigned ? c.volunteersAssigned.length : 0;
let needed = Number(c.volunteersNeeded) || 0;

let capacityDisplay = `<p><strong>Volunteers:</strong> ${assigned} / ${needed}</p>`;

if(assigned >= needed && needed > 0){
capacityDisplay = `

<p style="color:#2ecc71;font-weight:bold">
Project Fully Staffed
</p>
`;
}

/* Volunteer list */

let volunteers = "";

if(c.volunteersAssigned && c.volunteersAssigned.length > 0){

volunteers = "<p><strong>Volunteers Assigned:</strong></p>";

c.volunteersAssigned.forEach(v => {
volunteers += `<p>• ${v}</p>`;
});

}else{

volunteers = "<p>No volunteers assigned yet</p>";

}

/* Create card */

board.innerHTML += `

<div class="card">

<h3>${c.caseID}</h3>

<p><strong>${c.project}</strong></p>

<p>Location: ${c.location}</p>

<p>Status: ${c.status}</p>

${capacityDisplay}

${volunteers}

</div>

`;

});


</script>

</body>
</html>
