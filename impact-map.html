<!DOCTYPE html>

<html>
<head>

<title>BUSI Community Impact Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

#map{
height:500px;
border-radius:16px;
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>BUSI Community Impact Map</h1>

<p>
Projects completed by Busi Believers volunteers throughout San Antonio.
</p>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([29.4241, -98.4936], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution:'© OpenStreetMap'
}).addTo(map);

/* BUSI Project Cases */

var cases = {

"BUSI-006": L.marker([29.438, -98.49]).addTo(map)
.bindPopup("<b>BUSI-006</b><br>Tree Removal"),

"BUSI-007": L.marker([29.41, -98.47]).addTo(map)
.bindPopup("<b>BUSI-007</b><br>Lawn Care"),

"BUSI-008": L.marker([29.39, -98.51]).addTo(map)
.bindPopup("<b>BUSI-008</b><br>Vehicle Assistance")

};

/* Auto zoom when case link is used */

const params = new URLSearchParams(window.location.search);
const caseID = params.get("case");

if(caseID && cases[caseID]){

map.setView(cases[caseID].getLatLng(), 15);
cases[caseID].openPopup();

}

</script>
 
</body>
</html>
