<!DOCTYPE html>

<html>
<head>

<title>BUSI Community Impact Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
background:#0b1220;
color:white;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
text-align:center;
}

#map{
height:500px;
border-radius:16px;
margin-top:30px;
}

</style>

</head>

<body>

<div class="container">

<h1>BUSI Community Impact Map</h1>

<p>
Projects completed by Busi Believers volunteers throughout San Antonio.
</p>

<div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([29.4241, -98.4936], 11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
attribution:'© OpenStreetMap'
}).addTo(map);

/* BUSI Project Cases */

 var greenIcon = new L.Icon({
iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png',
shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
iconSize: [25, 41],
iconAnchor: [12, 41]
});

var blueIcon = new L.Icon({
iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
iconSize: [25, 41],
iconAnchor: [12, 41]
});

var yellowIcon = new L.Icon({
iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png',
shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
iconSize: [25, 41],
iconAnchor: [12, 41]
});

let cases = JSON.parse(localStorage.getItem("busiCases")) || [];

let markers = {};

cases.forEach(c => {

let lat = 29.4241 + (Math.random() - 0.5) * 0.1;
let lng = -98.4936 + (Math.random() - 0.5) * 0.1;

let icon = yellowIcon;

if(c.status === "Approved") icon = blueIcon;
if(c.status === "In Progress") icon = blueIcon;
if(c.status === "Completed") icon = greenIcon;

let marker = L.marker([lat, lng], {icon: icon}).addTo(map)
.bindPopup(`
<b>${c.caseID}</b><br>
Project: ${c.project}<br>
Location: ${c.location}<br>
Status: ${c.status}
`);

markers[c.caseID] = marker;

}); 

/* Auto zoom when case link is used */

const params = new URLSearchParams(window.location.search);
const caseID = params.get("case");

if(caseID && markers[caseID]){

map.setView(markers[caseID].getLatLng(), 15);
markers[caseID].openPopup();

}

 var legend = L.control({position: 'bottomright'});

legend.onAdd = function (map) {

var div = L.DomUtil.create('div', 'info legend');

div.innerHTML =

"<b>BUSI Project Status</b><br><br>" +

"<img src='https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-green.png' width='15'> Completed<br>" +

"<img src='https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png' width='15'> Active<br>" +

"<img src='https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-yellow.png' width='15'> Pending";

return div;

};

legend.addTo(map);
 
</script>
 
</body>
</html>
